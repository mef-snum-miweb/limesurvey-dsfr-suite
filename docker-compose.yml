# =============================================================================
# LimeSurvey DSFR Suite — Production (base)
# =============================================================================
#
# Ce fichier définit la **base vanilla** : LimeSurvey + MySQL + labels Traefik,
# **sans** les 4 modules DSFR. Les bind-mounts des modules vivent dans
# `docker-compose.override.yml`, qui est **auto-chargé** par Docker Compose.
#
# Modes d'usage :
#   docker compose up -d
#     → charge base + override → suite complète (comportement historique)
#
#   docker compose -f docker-compose.yml up -d
#     → bypass l'override → **instance vanilla** (utile pour tester
#       localement l'install à froid d'un module ; en prod on utilise
#       plutôt le repo dédié `limesurvey-core`).
#
# Avant de lancer :
#   git submodule update --init --recursive   # requis en mode suite
#   cp .env.example .env                       # puis éditer les valeurs
#
# Réseau : utilise le réseau externe défini par TRAEFIK_NETWORK (défaut
# `traefik_public`).
# =============================================================================

services:
  # Service nommé `web` : requis par l'override mail de spawn (--mail) qui attache
  # le réseau `mail` au service `web`. container_name reste `limesurvey-dsfr`.
  web:
    # Tag PINNÉ (et non le flottant 6-apache) : la référence d'iso-fonctionnalité
    # du thème est le core déployé (6.16.16, cf. check-list de montée de version
    # dans le README du thème). Un `docker compose pull` ne doit pas déplacer le
    # core silencieusement. Bump = décision explicite + re-gate complet.
    image: martialblog/limesurvey:6.16.16-260408-apache
    container_name: limesurvey-dsfr
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_TYPE=mysql
      - DB_HOST=db
      - DB_PORT=3306
    volumes:
      # --- PHP : override des limites par défaut (upload 2M → 16M).
      # `martialblog/limesurvey` ne propage pas les variables d'env vers
      # php.ini, on monte donc le fichier directement dans conf.d/. Le
      # préfixe `zzz-` du nom de destination garantit qu'il est chargé en
      # dernier et écrase les valeurs par défaut. Cf. php-uploads.ini.
      - ./php-uploads.ini:/usr/local/etc/php/conf.d/zzz-uploads.ini:ro
      # --- Données persistantes ---
      # NB : les bind-mounts des modules DSFR (docker-compose.override.yml)
      # sont imbriqués dans ce volume `limesurvey-upload` monté sur
      # /var/www/html/upload ; Docker applique le montage le plus profond,
      # donc `dsfr` (thème) est bien servi depuis le submodule quand
      # l'override est chargé.
      - limesurvey-upload:/var/www/html/upload
    depends_on:
      db:
        condition: service_healthy
    networks:
      - traefik_public
      - internal
    labels:
      # --- Traefik : tout est variabilisé via .env ---
      # PUBLIC_DOMAIN            : domaine public servi (ex. survey.example.org)
      # TRAEFIK_CERT_RESOLVER    : nom du certresolver Traefik (ex. letsencrypt)
      # TRAEFIK_TLS_OPTIONS      : nom de l'options TLS (ex. default, anssi-strict@file)
      # TRAEFIK_SECURITY_MW      : middleware de sécurité (ex. security-headers@file)
      #                            → laisser vide si pas de middleware
      - "traefik.enable=true"
      # Conteneur sur plusieurs réseaux (traefik + internal [+ mail]) → indiquer à
      # Traefik lequel utiliser pour joindre l'app, sinon 404.
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik_public}"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.limesurvey-http.rule=Host(`${PUBLIC_DOMAIN}`)"
      - "traefik.http.routers.limesurvey-http.entrypoints=web"
      - "traefik.http.routers.limesurvey-http.middlewares=redirect-to-https"
      # HTTPS
      - "traefik.http.routers.limesurvey-https.rule=Host(`${PUBLIC_DOMAIN}`)"
      - "traefik.http.routers.limesurvey-https.entrypoints=websecure"
      - "traefik.http.routers.limesurvey-https.tls=true"
      - "traefik.http.routers.limesurvey-https.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.routers.limesurvey-https.tls.options=${TRAEFIK_TLS_OPTIONS:-default}"
      - "traefik.http.routers.limesurvey-https.middlewares=${TRAEFIK_SECURITY_MW:-}"
      # Service
      - "traefik.http.services.limesurvey.loadbalancer.server.port=8080"
      # Middleware
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"

  db:
    image: mysql:8.0
    container_name: limesurvey-db
    restart: unless-stopped
    env_file: .env
    environment:
      - MYSQL_DATABASE=limesurvey
    volumes:
      - limesurvey-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

volumes:
  limesurvey-db:
  limesurvey-upload:

networks:
  # Réseau externe partagé avec la stack Traefik parente. Le nom du réseau
  # Docker externe est paramétrable via TRAEFIK_NETWORK (défaut : traefik_public).
  traefik_public:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik_public}
  internal:
    driver: bridge
