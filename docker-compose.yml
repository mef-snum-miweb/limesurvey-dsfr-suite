# =============================================================================
# LimeSurvey DSFR Suite — Production
# =============================================================================
#
# Ce fichier utilise les submodules git dans modules/ comme source des fichiers.
# Avant de lancer :
#   git submodule update --init --recursive
#
# Usage :
#   cp .env.example .env   # puis éditer les valeurs
#   docker compose up -d
#
# Réseau : utilise le réseau externe "ecosystem-network" (Traefik).
# Adapter les labels Traefik à votre domaine.
# =============================================================================

services:
  limesurvey:
    image: martialblog/limesurvey:6-apache
    container_name: limesurvey-dsfr
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_TYPE=mysql
      - DB_HOST=db
      - DB_PORT=3306
    volumes:
      # --- Modules DSFR (submodules git) ---
      - ./modules/theme-dsfr:/var/www/html/themes/survey/dsfr
      - ./modules/email-dsfr:/var/www/html/plugins/DSFRMail
      - ./modules/conversation-albert:/var/www/html/plugins/ConversationIA
      # --- Données persistantes ---
      - limesurvey-upload:/var/www/html/upload
    depends_on:
      db:
        condition: service_healthy
    networks:
      - traefik_public
      - internal
    labels:
      # --- Traefik : tout est variabilisé via .env ---
      # PUBLIC_DOMAIN            : domaine public servi (ex. survey.example.org)
      # TRAEFIK_CERT_RESOLVER    : nom du certresolver Traefik (ex. letsencrypt)
      # TRAEFIK_TLS_OPTIONS      : nom de l'options TLS (ex. default, anssi-strict@file)
      # TRAEFIK_SECURITY_MW      : middleware de sécurité (ex. security-headers@file)
      #                            → laisser vide si pas de middleware
      - "traefik.enable=true"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.limesurvey-http.rule=Host(`${PUBLIC_DOMAIN}`)"
      - "traefik.http.routers.limesurvey-http.entrypoints=web"
      - "traefik.http.routers.limesurvey-http.middlewares=redirect-to-https"
      # HTTPS
      - "traefik.http.routers.limesurvey-https.rule=Host(`${PUBLIC_DOMAIN}`)"
      - "traefik.http.routers.limesurvey-https.entrypoints=websecure"
      - "traefik.http.routers.limesurvey-https.tls=true"
      - "traefik.http.routers.limesurvey-https.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.routers.limesurvey-https.tls.options=${TRAEFIK_TLS_OPTIONS:-default}"
      - "traefik.http.routers.limesurvey-https.middlewares=${TRAEFIK_SECURITY_MW:-}"
      # Service
      - "traefik.http.services.limesurvey.loadbalancer.server.port=8080"
      # Middleware
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"

  db:
    image: mysql:8.0
    container_name: limesurvey-db
    restart: unless-stopped
    env_file: .env
    environment:
      - MYSQL_DATABASE=limesurvey
    volumes:
      - limesurvey-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

volumes:
  limesurvey-db:
  limesurvey-upload:

networks:
  # Réseau externe partagé avec la stack Traefik parente. Le nom du réseau
  # Docker externe est paramétrable via TRAEFIK_NETWORK (défaut : traefik_public).
  traefik_public:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik_public}
  internal:
    driver: bridge
