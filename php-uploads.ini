; Limites d'upload PHP pour LimeSurvey en prod.
;
; L'image `martialblog/limesurvey:6-apache` ne propage pas les variables
; d'environnement PHP_UPLOAD_MAX_FILESIZE vers php.ini → on monte ce
; fichier directement dans `/usr/local/etc/php/conf.d/zzz-uploads.ini`
; (cf. docker-compose.yml). Le préfixe `zzz-` garantit qu'il est chargé
; en dernier et écrase les défauts.
;
; Pour modifier : éditer ce fichier, commit, `git pull && docker compose
; up -d --force-recreate limesurvey` sur le VPS.

upload_max_filesize = 16M
post_max_size = 32M
memory_limit = 256M
