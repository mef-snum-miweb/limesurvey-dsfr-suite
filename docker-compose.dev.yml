# =============================================================================
# LimeSurvey DSFR Suite — Développement local
# =============================================================================
#
# Prérequis : initialiser les submodules avant le premier lancement :
#
#   git submodule update --init --recursive
#
# Les 3 modules (thème + 2 plugins) sont montés en direct depuis les submodules
# de ce repo (modules/*). Toute modification faite dans modules/<nom>/ va
# dans le submodule correspondant et est visible instantanément (F5) dans
# le conteneur.
#
# Usage :
#   docker compose -f docker-compose.dev.yml up -d
#   → http://localhost:8081 (admin / admin)
# =============================================================================

services:
  limesurvey:
    # Tag PINNÉ (et non le flottant 6-apache) : la référence d'iso-fonctionnalité
    # du thème est le core déployé (6.16.16, cf. check-list de montée de version
    # dans le README du thème). Un `docker compose pull` ne doit pas déplacer le
    # core silencieusement. Bump = décision explicite + re-gate complet.
    image: martialblog/limesurvey:6.16.16-260408-apache
    container_name: limesurvey-dev
    restart: unless-stopped
    environment:
      - DB_TYPE=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USERNAME=limesurvey
      - DB_PASSWORD=limesurvey
      - DB_NAME=limesurvey
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=admin
      - ADMIN_NAME=Administrateur
      - ADMIN_EMAIL=admin@example.com
    ports:
      - "8081:8080"
    volumes:
      # --- Modules DSFR (submodules montés en direct) ---
      - ./modules/theme-dsfr:/var/www/html/upload/themes/survey/dsfr
      - ./modules/email-dsfr:/var/www/html/plugins/DSFRMail
      - ./modules/conversation-albert:/var/www/html/plugins/ConversationIA
      # --- Plugin CKEditorDSFR (palette de composants + styles, cf. ADR-071) ---
      # Injection via événements natifs CKEditor (aucun override de config.js).
      # Monté comme les autres plugins ; à activer dans Configuration > Plugins.
      - ./modules/ckeditor-dsfr:/var/www/html/plugins/CKEditorDSFR
      # --- Données persistantes ---
      - limesurvey-upload-dev:/var/www/html/upload
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: limesurvey-dev-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=limesurvey
      - MYSQL_USER=limesurvey
      - MYSQL_PASSWORD=limesurvey
    volumes:
      - limesurvey-db-dev:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  limesurvey-db-dev:
  limesurvey-upload-dev:
